# agent-notifier 用最小 mosquitto 配置(可移植)。仅家庭局域网;需鉴权可加 password_file 并关 allow_anonymous。
# 只定义监听 + 匿名。持久化/日志交给平台默认配置:
#   - Debian:放 /etc/mosquitto/conf.d/,主配置 /etc/mosquitto/mosquitto.conf 已含 persistence/log_dest;
#   - macOS/brew:放 /opt/homebrew/etc/mosquitto/mosquitto.conf。
listener 1883 0.0.0.0
allow_anonymous true
